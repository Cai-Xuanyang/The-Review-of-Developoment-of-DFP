name: LaTeX CI and Spell Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Cai_Xuanyang_The_Development_of_DFP.tex 
          compiler: xelatex  
          args: "-interaction=nonstopmode"

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-paper
          path: |
            Cai_Xuanyang_The_Development_of_DFP.pdf  
          retention-days: 30 

  spell_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pyspelling and dependencies
        run: |
          echo "Installing pyspelling..."
          pip install pyspelling
          
          echo "Installing aspell and dictionaries..."
          sudo apt-get update
          sudo apt-get install -y aspell aspell-en
          # sudo apt-get install -y hunspell-en-us

      - name: Create Spell Check Config
        run: |
          echo "Cai" > .wordlist.txt
          echo "Xuanyang" >> .wordlist.txt
          echo "DFP" >> .wordlist.txt
          echo "BFGS" >> .wordlist.txt
          echo "Nocedal" >> .wordlist.txt
          echo "Broyden" >> .wordlist.txt
          echo "Davidon" >> .wordlist.txt
          echo "Shanno" >> .wordlist.txt
          echo "Powell" >> .wordlist.txt
          echo "Zoutendijk" >> .wordlist.txt
          echo "Armijo" >> .wordlist.txt
          echo "Wolfe" >> .wordlist.txt
          echo "Fukushima" >> .wordlist.txt
          echo "Nishihara" >> .wordlist.txt
          echo "Moritz" >> .wordlist.txt
          echo "Yaxiang" >> .wordlist.txt
          echo "Dai" >> .wordlist.txt
          echo "Hessian" >> .wordlist.txt
          echo "Hessians" >> .wordlist.txt
          echo "Nonconvex" >> .wordlist.txt
          echo "Nonconvexity" >> .wordlist.txt
          echo "Subsampling" >> .wordlist.txt
          echo "Superlinear" >> .wordlist.txt
          echo "Minimality" >> .wordlist.txt
          echo "Boundedness" >> .wordlist.txt
          echo "AISTATS" >> .wordlist.txt
          echo "SciPy" >> .wordlist.txt
          echo "TeXbook" >> .wordlist.txt
          echo "GitHub" >> .wordlist.txt
          echo "arXiv" >> .wordlist.txt
          echo "LaTeX" >> .wordlist.txt
          echo "BibTeX" >> .wordlist.txt

          echo "matrix:" > .spelling.yml
          echo "  - name: LaTeX Check" >> .spelling.yml
          echo "    sources:" >> .spelling.yml
          echo "      - '**/*.tex'" >> .spelling.yml
          echo "    dictionary:" >> .spelling.yml
          echo "      wordlists:" >> .spelling.yml
          echo "        - .wordlist.txt" >> .spelling.yml
          echo "      output: .wordlist.dic" >> .spelling.yml
          echo "    pipeline:" >> .spelling.yml
          echo "      - pyspelling.filters.context:" >> .spelling.yml
          echo "          context_visible_first: true" >> .spelling.yml
          echo "          delimiters:" >> .spelling.yml
          echo "            - open: '\\\\[a-zA-Z@]+'" >> .spelling.yml
          echo "              close: '(?=[^a-zA-Z@])'" >> .spelling.yml
          echo "            - open: '\\\\begin\\{[^}]*\\}'" >> .spelling.yml
          echo "              close: '\\\\end\\{[^}]*\\}'" >> .spelling.yml
          echo "            - open: '\\$(?!\\$)'" >> .spelling.yml
          echo "              close: '\\$(?!\\$)'" >> .spelling.yml
          echo "            - open: '\\$\\$'" >> .spelling.yml
          echo "              close: '\\$\\$'" >> .spelling.yml
          echo "            - open: '%'" >> .spelling.yml
          echo "              close: '\\n'" >> .spelling.yml
          
      - name: Create Default Wordlist (Optional)
        run: |
          echo "DFP" > .wordlist.txt
          echo "Xuanyang" >> .wordlist.txt
          echo "LaTeX" >> .wordlist.txt

      - name: Run Spell Check
        run: |
          pyspelling -c .spelling.yml
        continue-on-error: true 
