name: LaTeX CI and Spell Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Cai_Xuanyang_The_Development_of_DFP.tex 
          compiler: xelatex  
          args: "-interaction=nonstopmode"

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-paper
          path: |
            Cai_Xuanyang_The_Development_of_DFP.pdf  
          retention-days: 30 

  spell_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pyspelling and dependencies
        run: |
          pip install pyspelling
          sudo apt-get update
          sudo apt-get install -y hunspell-en-us

      - name: Create Spell Check Config
        run: |
          cat > .spelling.yml <<EOF
          matrix:
          - name: Markdown and Text
            sources:
            - '**/*.md'
            - '**/*.txt'
            - '**/*.tex'  
            dictionary:
              wordlists:
              - .wordlist.txt
              output: .wordlist.dic
            pipeline:
            - pyspelling.filters.context:
                context_visible_first: true
                delimiters:
                - open: '\\begin\{.*?\}'
                  close: '\\end\{.*?\}'
                - open: '\\[a-zA-Z]+\*?\{[^}]*\}' 
                - open: '\\[a-zA-Z]+\*?\[[^\]]*\]\{[^}]*\}'
                - open: '\$'
                  close: '\$'
                - open: '\$\$'
                  close: '\$\$'
          EOF

      - name: Create Default Wordlist (Optional)
        run: |
          echo "DFP" > .wordlist.txt
          echo "Xuanyang" >> .wordlist.txt
          echo "LaTeX" >> .wordlist.txt

      - name: Run Spell Check
        run: |
          pyspelling -c .spelling.yml
        continue-on-error: true 
