name: LaTeX CI and Spell Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Cai_Xuanyang_The_Development_of_DFP.tex 
          compiler: xelatex  
          args: "-interaction=nonstopmode"

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-paper
          path: |
            Cai_Xuanyang_The_Development_of_DFP.pdf  
          retention-days: 30 

  spell_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aspell aspell-en
          pip install pyspelling

      - name: Prepare Dictionary and Config
        run: |
          cat > .wordlist.txt << EOF
          Cai
          Xuanyang
          DFP
          BFGS
          Nocedal
          Broyden
          Davidon
          Shanno
          Powell
          Zoutendijk
          Armijo
          Wolfe
          Fukushima
          Nishihara
          Moritz
          Yaxiang
          Dai
          Hessian
          Hessians
          Nonconvex
          Nonconvexity
          Subsampling
          Superlinear
          Minimality
          Boundedness
          AISTATS
          SciPy
          TeXbook
          GitHub
          arXiv
          LaTeX
          BibTeX
          EOF

          cat > .spelling.yml << EOF
          matrix:
            - name: LaTeX Check
              sources:
                - '**/*.tex'
              dictionary:
                wordlists:
                  - .wordlist.txt
                output: .wordlist.dic
              pipeline:
                - pyspelling.filters.context:
                    context_visible_first: true
                    delimiters:
                      - open: '\\\\[a-zA-Z@]+'
                        close: '(?=[^a-zA-Z@])'
                      - open: '\\\\begin\\{[^}]*\\}'
                        close: '\\\\end\\{[^}]*\\}'
                      - open: '\\$(?!\\$)'
                        close: '\\$(?!\\$)'
                      - open: '\\$\\$'
                        close: '\\$\\$'
                      - open: '%'
                        close: '\\n'
          EOF

      - name: Run Spell Check
        run: |
          pyspelling -c .spelling.yml || true
